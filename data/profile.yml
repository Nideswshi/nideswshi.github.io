  - value: Deployable System
    label: 保持可发布、可扩展、可迭代
strengths:
  - title: 信息架构与表达
    description: 擅长把零散的项目经历、技术笔记与个人观点整理成清晰、可读、可长期维护的内容结构。
  - title: 前端实现与细节
    description: 重视视觉节奏、排版层级、交互反馈与响应式体验，让界面既克制又有辨识度。
