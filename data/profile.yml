name: Nideswshi
headline: 以作品、文字与持续迭代，构建可靠的个人技术名片
summary: 这个网站被重新定义为一座兼具作品集、技术博客、学习档案与线上简历功能的个人站点。它强调冷静的视觉表达、清晰的信息层级与长期可维护的内容体系，让每一个项目、每一篇文章都能服务于未来的职业发展与公开表达。
status: 持续迭代中，面向求职展示、技术表达与长期个人品牌建设
location: China / Remote Friendly
