{{- define "main" -}}
  {{- $journey := .Site.Data.journey.items -}}
  <div class="career-page">
    <section class="career-section" data-aos="{{ .Site.Params.animation.options.article.whole }}">
      <div class="section-heading">
        <h2>{{ .Title }}</h2>
        <p>用倒序时间线记录关键节点、项目实践和能力成长。</p>
      </div>
      <article class="content-panel article-entry">
        {{ .Content }}
      </article>
    </section>

    <section class="timeline">
      {{- range $journey -}}
        <article class="timeline-item" data-aos="{{ $.Site.Params.animation.options.archive.section }}">
          <div class="timeline-item__date">{{ .date }}</div>
          <div class="timeline-item__content">
            <span class="career-eyebrow">{{ .stage }}</span>
            <h3>{{ .title }}</h3>
            <p>{{ .description }}</p>
            {{- with .tags -}}
              <div class="tag-list">
                {{- range . -}}
                  <span class="tag">{{ . }}</span>
                {{- end -}}
              </div>
            {{- end -}}
          </div>
        </article>
      {{- end -}}
    </section>
  </div>
{{- end -}}
