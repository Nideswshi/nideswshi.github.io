baseURL = 'https://nideswshi.github.io/'
theme = 'hugo-theme-reimu'
defaultContentLanguage = 'zh-CN'
enableEmoji = 'true'

[languages]
  [languages.zh-CN]
  languageCode = 'zh-CN'
  languageName = '简体中文'
  weight = 1
  hasCJKLanguage = 'true'
  title = '个人博客'
  author = 'Json'

  [languages.en]
  languageCode = 'en'
  languageName = 'English'
  weight = 2
  hasCJKLanguage = 'true'
  title = 'Personal Blog'
  author = 'Json'

  [languages.ja]
  languageCode = 'ja'
  languageName = '日本語'
  weight = 3
  hasCJKLanguage = 'true'
  title = '個人ブログ'
  author = 'Json'

[markup.highlight]
guessSyntax = 'true'
noClasses = 'false'

[markup.goldmark.extensions.passthrough]
enable = 'true'
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[outputs]
home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
baseName = "algolia"
isPlainText = 'true'
mediaType = "application/json"
notAlternative = 'true'

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = 'true'
    startLevel = 1